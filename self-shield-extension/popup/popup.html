<!DOCTYPE html>
<html>
<head>
  <title>Self-Shield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../icons/icon48.png" alt="Logo" class="logo">
      <h1>Self-Shield</h1>
    </header>

    <div id="status-container" class="status-box">
      <p>Status: <span id="status-text">Checking...</span></p>
      <p>Device ID: <span id="device-id">None</span></p>
      <button id="syncBtn" class="secondary-btn">Sync Now</button>
    </div>

    <div id="pair-container" class="form-group hidden">
      <label for="deviceIdInput">Enter Device ID to Pair:</label>
      <input type="text" id="deviceIdInput" placeholder="Enter ID from Admin Panel">
      <button id="pairBtn">Pair Device</button>
    </div>

    <footer>
      <p>Manage rules at <a href="https://selfshield.app" target="_blank">Admin Panel</a></p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
