<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Self-Shield - Pair Device</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- TopAppBar -->
  <header class="app-bar">
    <div class="app-bar-logo">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shield</span>
      <h1>Self-Shield</h1>
    </div>
    <div class="app-bar-profile">
      <span class="material-symbols-outlined">person</span>
    </div>
  </header>

  <!-- Main Content Canvas -->
  <main class="main-content">
    <div class="content-wrapper">
      
      <!-- Status Bento Card -->
      <div class="status-card state-inactive" id="status-card">
        <div class="status-aura"></div>
        <div class="status-icon-container">
          <span class="material-symbols-outlined status-icon" id="status-icon">phonelink_erase</span>
        </div>
        <div class="status-info">
          <div class="status-title-row">
            <span class="status-dot animate-pulse" id="status-dot"></span>
            <h2 id="status-text">Inactive</h2>
          </div>
          <p id="device-id">Not Paired</p>
        </div>
      </div>

      <!-- Pairing Interface -->
      <div id="pair-container" class="pair-card">
        <div class="input-group">
          <label for="deviceIdInput">
            <span class="material-symbols-outlined">key</span>
            Authentication Key
          </label>
          <div class="input-wrapper">
            <input id="deviceIdInput" placeholder="Enter ID from Admin Panel" type="text"/>
            <div class="input-icon">
              <span class="material-symbols-outlined">dialpad</span>
            </div>
          </div>
        </div>
        <button id="pairBtn" class="primary-btn">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_link</span>
          Pair Device
        </button>
      </div>



      <!-- Active Site Blocking -->
      <div id="active-site-container" class="pair-card hidden">
        <div class="input-group">
          <label>
            <span class="material-symbols-outlined">public</span>
            Current Website
          </label>
          <div class="site-display">
            <span id="current-hostname">Detecting...</span>
          </div>
        </div>
        <button id="quickBlockBtn" class="primary-btn" style="background: #ef4444; color: white;">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">block</span>
          Block This Site
        </button>
      </div>

      <!-- Contextual Help -->
      <div class="help-link">
        <a href="https://selfshield.app" target="_blank">
          <span class="material-symbols-outlined">settings_suggest</span>
          Manage rules at Admin Panel
        </a>
      </div>
      
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
