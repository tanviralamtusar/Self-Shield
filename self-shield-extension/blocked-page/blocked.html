<!DOCTYPE html>
<html>
<head>
  <title>Self-Shield | Blocked</title>
  <style>
    body {
      background: #0f172a;
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      background: #1e293b;
      padding: 3rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 500px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #818cf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      font-size: 1.1rem;
      line-height: 1.6;
    }
    .shield-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    .btn {
      margin-top: 2rem;
      background: #6366f1;
      color: white;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="shield-icon">🛡️</div>
    <h1>Access Restricted</h1>
    <p>This website is blocked by <strong>Self-Shield</strong> to keep you focused and protected.</p>
    <p>Go back to the admin panel to manage your restrictions.</p>
    <a href="https://selfshield.app" target="_blank" class="btn">Open Admin Panel</a>
  </div>

  <script>
    // Notify background script that a block event occurred
    const urlParams = new URLSearchParams(window.location.search);
    const blockedUrl = document.referrer || 'Unknown';
    
    chrome.runtime.sendMessage({ 
      action: 'reportBlock', 
      target: blockedUrl 
    });
  </script>
</body>
</html>
