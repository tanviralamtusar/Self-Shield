<!DOCTYPE html>
<html>
<head>
  <title>Access Restricted | Self-Shield</title>
  <style>
    body {
      background: #0b1120;
      color: #f8fafc;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 600px;
      padding: 20px;
      text-align: center;
    }
    .shield-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 2.5rem;
    }
    .shield-icon {
      font-size: 80px;
      filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3));
    }
    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin: 0 0 1.5rem 0;
      background: linear-gradient(to bottom, #818cf8, #6366f1);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    p {
      color: #94a3b8;
      font-size: 1.25rem;
      line-height: 1.6;
      margin: 0;
      max-width: 450px;
      font-weight: 400;
    }
    .url-tag {
      margin-top: 4rem;
      background: rgba(30, 41, 59, 0.7);
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.95rem;
      color: #94a3b8;
      backdrop-filter: blur(8px);
    }
    .url-tag code {
      color: #818cf8;
      margin-left: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="shield-container">
      <div class="shield-icon">🛡️</div>
    </div>
    <h1>Access Restricted</h1>
    <p>This content is blocked by Self-Shield to keep you focused and protected.</p>
  </div>

  <script>
    // Get original URL if passed via query param or use referrer
    const urlParams = new URLSearchParams(window.location.search);
    const originalUrl = urlParams.get('url') || document.referrer;
    
    if (originalUrl) {
      try {
        const host = new URL(originalUrl).hostname;
        document.getElementById('blocked-host').textContent = host;
      } catch (e) {
        document.getElementById('blocked-host').textContent = originalUrl;
      }
    } else {
      document.getElementById('blocked-host').textContent = 'Restricted Content';
    }

    // Report to background for analytics
    chrome.runtime.sendMessage({ 
      action: 'reportBlock', 
      target: originalUrl || 'Unknown' 
    });
  </script>
</body>
</html>
